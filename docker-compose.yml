services:
  app:
    build: .
    ports:
      - "8081:80"
    env_file:
      - .env
    depends_on:
      - mysql
    volumes:
      - .:/var/www/html

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: driveby_lab
      MYSQL_USER: driveby_lab
      MYSQL_PASSWORD: driveby_lab_dev_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/migrations/001_create_core_tables.sql:/docker-entrypoint-initdb.d/001_create_core_tables.sql:ro
      - ./database/seeders/001_seed_research_data.sql:/docker-entrypoint-initdb.d/002_seed_research_data.sql:ro

volumes:
  mysql_data:
